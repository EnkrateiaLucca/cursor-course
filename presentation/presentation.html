  <div>
    <h3>Why It Matters</h3>
    <ul>
      <li>Fixed context windows (128k-1M tokens)</li>
      <li>Comprehension ≠ token count</li>
      <li>Poor context = hallucinations</li>
    </ul>
  </div>
  <div>
    <h3>Best Practices</h3>
    <ul>
      <li>Use @-mentions for precision</li>
      <li>Start new chats frequently</li>
      <li>Configure .cursorignore</li>
    </ul>
  </div>
</div>

</div>

# Project Rules: .cursor/rules

<div style="margin-top: 0px;">

<div style="background: #f0f8ff; padding: 5px; border-radius: 15px; margin-bottom: 5px;">
  <h3>Four Application Modes</h3>
  <ol>
    <li><strong>Always Apply</strong> - Every session automatically</li>
    <li><strong>Apply Intelligently</strong> - AI determines relevance (recommended)</li>
    <li><strong>Apply to Specific Files</strong> - Pattern matching (*.test.ts)</li>
    <li><strong>Apply Manually</strong> - Activated with @-mention</li>
